# RateMaster - ratemaster.flowtasks.io
# Add to /etc/nginx/sites-available/ and symlink to sites-enabled
# Then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name ratemaster.flowtasks.io;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ratemaster.flowtasks.io;

    # SSL - run once: sudo certbot certonly --nginx -d ratemaster.flowtasks.io
    ssl_certificate /etc/letsencrypt/live/ratemaster.flowtasks.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ratemaster.flowtasks.io/privkey.pem;

    client_max_body_size 10M;

    # Frontend (Next.js) - serves app and proxies /api/v1 to backend
    location / {
        proxy_pass http://127.0.0.1:30000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
