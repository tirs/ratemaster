# RateMaster - HTTP only for initial certbot run
# Use this first to get the SSL cert, then replace with nginx-ratemaster.conf
#
# 1. sudo cp deploy/nginx-ratemaster-bootstrap.conf /etc/nginx/sites-available/ratemaster
# 2. sudo ln -sf /etc/nginx/sites-available/ratemaster /etc/nginx/sites-enabled/
# 3. sudo nginx -t && sudo systemctl reload nginx
# 4. sudo certbot certonly --nginx -d ratemaster.flowtasks.io
# 5. sudo cp deploy/nginx-ratemaster.conf /etc/nginx/sites-available/ratemaster
# 6. sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name ratemaster.flowtasks.io;
    root /var/www/html;
}
