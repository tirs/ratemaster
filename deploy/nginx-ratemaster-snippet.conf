# RateMaster - add this block to your main nginx config in /opt/flowtasks
# (e.g. the file that gets copied to /etc/nginx/sites-available/flow-flowtasks or similar)
#
# Get cert first: sudo systemctl stop nginx && sudo certbot certonly --standalone -d ratemaster.flowtasks.io && sudo systemctl start nginx

server {
    listen 80;
    server_name ratemaster.flowtasks.io;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name ratemaster.flowtasks.io;

    ssl_certificate /etc/letsencrypt/live/ratemaster.flowtasks.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ratemaster.flowtasks.io/privkey.pem;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:30000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
