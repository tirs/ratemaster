# RateMaster - add this block to flowtasks frontend nginx.conf
# Requires: 1) cert from certbot, 2) volume mounts in flowtasks docker-compose
# See deploy/FLOWTASKS_RATEMASTER_SETUP.md for full instructions

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ratemaster.flowtasks.io;

    ssl_certificate /etc/nginx/ssl/ratemaster-fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/ratemaster-privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 10M;

    location / {
        proxy_pass http://host.docker.internal:30000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
